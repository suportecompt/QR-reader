<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Leitor Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>Controlo de Acesso</h1>
    <p>Introduza a palavra-passe para usar o scanner</p>
    
    <div class="login-form">
        <input type="text" id="username" placeholder="Utilizador">
        <input type="password" id="password" placeholder="Palavra-passe">
        <button id="btn-login" class="btn btn-scan">Entrar no Sistema</button>
        <div id="login-error" class="error-msg">❌ Credenciais incorretas</div>
    </div>
</div>

<script src="config.js"></script>
<script src="login.js"></script>

</body>
</html>
