<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Lector Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>Control de Acceso</h1>
    <p>Introduce la contraseña para usar el escáner</p>
    
    <div class="login-form">
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn-login" class="btn btn-scan">Entrar al Sistema</button>
        <div id="login-error" class="error-msg">❌ Credenciales incorrectas</div>
    </div>
</div>

<script src="config.js"></script>
<script src="login.js"></script>

</body>
</html>
